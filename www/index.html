<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Void Engine — Demo</title>
  <style>
    body { margin: 0; background: #0A0E17; color: #00E5FF; font-family: monospace; }
    #info { position: fixed; bottom: 16px; left: 16px; font-size: 12px; opacity: 0.6; }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="info">Void Engine v0.1.0 — Particle Fluid Simulation</div>
  <script type="module">
    import init, { ParticleSystem } from "../pkg/void_engine.js";
    async function main() {
      await init();
      const sim = new ParticleSystem(1024);
      const canvas = document.getElementById("canvas");
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      const ctx = canvas.getContext("2d");
      function frame() {
        sim.update(0.016);
        const pos = sim.get_positions();
        ctx.fillStyle = "#0A0E17";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        for (let i = 0; i < sim.get_count(); i++) {
          const x = (pos[i*3] / 3) * canvas.width/2 + canvas.width/2;
          const y = (-pos[i*3+1] / 3) * canvas.height/2 + canvas.height/2;
          ctx.fillStyle = "#00E5FF";
          ctx.beginPath();
          ctx.arc(x, y, 2, 0, Math.PI * 2);
          ctx.fill();
        }
        requestAnimationFrame(frame);
      }
      frame();
    }
    main();
  </script>
</body>
</html>
